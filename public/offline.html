<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LUMEN | Sin conexion</title>
    <meta name="theme-color" content="#0b4a53" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f4f7f2;
        color: #143538;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(520px, calc(100% - 32px));
        border: 1px solid #d9e2de;
        border-radius: 16px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 2rem;
      }

      p {
        margin: 0;
        color: #5f6f6c;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Estas sin conexion</h1>
      <p>Cuando vuelvas a tener internet, actualiza la pagina para seguir usando LUMEN.</p>
    </main>
  </body>
</html>
